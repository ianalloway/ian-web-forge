name: Risk Policy Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  risk-tier:
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.compute.outputs.tier }}
      changed-files: ${{ steps.compute.outputs.changed_files }}
      required-checks: ${{ steps.compute.outputs.required_checks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute risk tier from policy
        id: compute
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_REF:-}" ]; then
            git fetch --no-tags --depth=1 origin "${BASE_REF}"
            git diff --name-only "origin/${BASE_REF}...HEAD" > changed-files.txt
            git show "origin/${BASE_REF}:risk-policy.json" > trusted-risk-policy.json
          else
            git diff --name-only HEAD~1..HEAD > changed-files.txt
            cp risk-policy.json trusted-risk-policy.json
          fi

          node <<'NODE'
          const fs = require('fs');
          const policy = JSON.parse(fs.readFileSync('trusted-risk-policy.json', 'utf8'));
          const files = fs.readFileSync('changed-files.txt', 'utf8')
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);

          const escapeRegex = (value) => value.replace(/[.+^${}()|[\]\\]/g, '\\$&');
          const globToRegex = (glob) => {
            let pattern = '';
            for (let i = 0; i < glob.length; i += 1) {
              const char = glob[i];
              const next = glob[i + 1];
              if (char === '*' && next === '*') {
                if (glob[i + 2] === '/') {
                  pattern += '(?:.*/)?';
                  i += 2;
                } else {
                  pattern += '.*';
                  i += 1;
                }
              } else if (char === '*') {
                pattern += '[^/]*';
              } else {
                pattern += escapeRegex(char);
              }
            }
            return new RegExp(`^${pattern}$`);
          };

          const matchesAny = (patterns) => files.some((file) => patterns.some((glob) => globToRegex(glob).test(file)));
          const tier = matchesAny(policy.tiers.high) ? 'high' : matchesAny(policy.tiers.medium) ? 'medium' : 'low';
          const requiredChecks = policy.mergePolicy[tier]?.requiredChecks || [];
          const output = fs.createWriteStream(process.env.GITHUB_OUTPUT, { flags: 'a' });
          output.write(`tier=${tier}\n`);
          output.write(`changed_files=${files.join(',')}\n`);
          output.write(`required_checks=${requiredChecks.join(', ')}\n`);
          output.end();
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `## Risk Assessment\n**Policy source:** trusted base branch\n\n**Tier:** ${tier}\n\n**Changed files:** ${files.length ? files.join(', ') : 'none'}\n\n**Required checks:** ${requiredChecks.join(', ')}\n`);
          NODE

  risk-policy-gate:
    name: risk-policy-gate
    needs: risk-tier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Enforce current-head policy gate
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -f risk-policy.json
          test -n "${{ needs.risk-tier.outputs.tier }}"
          test -n "${{ needs.risk-tier.outputs.required-checks }}"
          echo "Risk tier: ${{ needs.risk-tier.outputs.tier }}"
          echo "Required checks: ${{ needs.risk-tier.outputs.required-checks }}"

  harness-smoke:
    name: harness-smoke
    needs: risk-tier
    if: needs.risk-tier.outputs.tier == 'high'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Run smoke validation
        run: |
          set -euo pipefail
          npm ci
          npm run build

  browser-evidence:
    name: Browser Evidence
    needs: [risk-tier, harness-smoke]
    if: always() && needs.risk-tier.outputs.tier == 'high'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Capture browser evidence
        run: |
          set -euo pipefail
          test "${{ needs.harness-smoke.result }}" = "success"
          npm ci
          npm run build
          test -d dist
          echo "Browser evidence captured via production build artifact verification" >> "$GITHUB_STEP_SUMMARY"
